# NeuroCI — Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── NeuroCI Webhook Server ──
  - job_name: "neuroci"
    static_configs:
      - targets: ["webhook:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # ── Prometheus self-monitoring ──
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
