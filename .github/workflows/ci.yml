# NeuroCI — GitHub Actions CI for the project itself
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check src/ tests/

      - name: Type check with MyPy
        run: mypy src/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          GITHUB_TOKEN: fake-token
          GITHUB_WEBHOOK_SECRET: test-secret
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: fake-key
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t neuroci:test .

      - name: Verify image
        run: docker run --rm neuroci:test python -c "from src.models import FailureCategory; print('OK')"
