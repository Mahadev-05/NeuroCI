# NeuroCI — Webhook Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuroci-webhook
  namespace: neuroci
  labels:
    app: neuroci
    component: webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neuroci
      component: webhook
  template:
    metadata:
      labels:
        app: neuroci
        component: webhook
    spec:
      containers:
        - name: webhook
          image: neuroci:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: neuroci-secrets
          env:
            - name: REDIS_URL
              value: redis://neuroci-redis:6379/0
            - name: CHROMA_HOST
              value: neuroci-chromadb
            - name: OPA_URL
              value: http://neuroci-opa:8181
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: neuroci-webhook
  namespace: neuroci
spec:
  selector:
    app: neuroci
    component: webhook
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
